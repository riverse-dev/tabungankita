<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tabungankita">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>TabunganKita</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #F6FAF9;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      font-family: 'Inter', sans-serif;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #D9E5E4;
      border-top: 4px solid #006A6A;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      color: #006A6A;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Prevent text selection */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }
  </style>
</head>

<body>
  <div id="loading-indicator" class="loader-container">
    <div class="spinner"></div>
    <div class="loading-text">TabunganKita</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Remove loading indicator after flutter is loaded
      var checkExist = setInterval(function() {
         if (document.querySelector('flt-glass-pane')) {
            document.getElementById('loading-indicator').remove();
            clearInterval(checkExist);
         }
      }, 100);
    });
  </script>
</body>

</html>
